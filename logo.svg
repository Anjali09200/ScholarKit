<svg width="220" height="80" viewBox="0 0 220 80" xmlns="http://www.w3.org/2000/svg">

  <!-- Shield shape -->
  <path d="M38,6 L66,18 L66,46 Q66,62 38,70 Q10,62 10,46 L10,18 Z"
    fill="#E6F1FB" stroke="#185FA5" stroke-width="2.5"/>

  <!-- Circuit lines inside shield -->
  <line x1="22" y1="28" x2="54" y2="28" stroke="#185FA5" stroke-width="1.4" opacity="0.6"/>
  <line x1="22" y1="38" x2="54" y2="38" stroke="#185FA5" stroke-width="1.4" opacity="0.6"/>
  <line x1="22" y1="50" x2="54" y2="50" stroke="#185FA5" stroke-width="1.4" opacity="0.6"/>
  <line x1="30" y1="22" x2="30" y2="58" stroke="#185FA5" stroke-width="1.4" opacity="0.6"/>
  <line x1="46" y1="22" x2="46" y2="58" stroke="#185FA5" stroke-width="1.4" opacity="0.6"/>

  <!-- Circuit dots -->
  <circle cx="30" cy="28" r="3.5" fill="#185FA5"/>
  <circle cx="46" cy="38" r="3.5" fill="#185FA5"/>
  <circle cx="30" cy="50" r="3.5" fill="#185FA5"/>
  <circle cx="46" cy="28" r="2.5" fill="#185FA5" opacity="0.5"/>
  <circle cx="30" cy="38" r="2.5" fill="#185FA5" opacity="0.5"/>

  <!-- Wordmark: Scholar -->
  <text x="76" y="50"
    font-family="'Trebuchet MS', sans-serif"
    font-size="28"
    font-weight="700"
    fill="#185FA5"
