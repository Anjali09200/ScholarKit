  <!-- Kit badge pill -->
  <rect x="168" y="26" width="46" height="28" rx="6" fill="#185FA5"/>
  <text x="191" y="46"
    font-family="'Courier New', monospace"
    font-size="16"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle">Kit</text>

</svg>